<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Biluxe10 — Canva Masterclass</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&amp;family=DM+Sans:ital,wght@0,300;0,500;0,700;1,400&amp;display=swap" rel="stylesheet">
<style>
:root {
  --ink:   #08192E;
  --fire:  #FF5733;
  --amber: #FFA500;
  --white: #FFFFFF;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }

body {
  background: var(--ink);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  gap: 18px;
  overflow-x: hidden;
}

body::before, body::after {
  content:'';
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:0;
  filter:blur(90px);
  animation: orb 9s ease-in-out infinite alternate;
}
body::before {
  width:520px; height:520px;
  background: radial-gradient(circle, rgba(255,87,51,0.2), transparent 70%);
  top:-120px; left:-120px;
}
body::after {
  width:420px; height:420px;
  background: radial-gradient(circle, rgba(255,165,0,0.15), transparent 70%);
  bottom:-80px; right:-80px;
  animation-delay:-4.5s;
}
@keyframes orb {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(50px,35px) scale(1.18); }
}

.header {
  position:relative; z-index:1;
  text-align:center;
}
.header h1 {
  font-family:'Syne',sans-serif;
  font-weight:900;
  font-size:clamp(20px,4vw,32px);
  color:var(--white);
  letter-spacing:-1px;
}
.header h1 em { font-style:normal; color:var(--fire); }
.header p {
  font-size:11px;
  color:rgba(255,255,255,0.38);
  margin-top:4px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.card {
  position:relative; z-index:1;
  width:100%; max-width:900px;
  border-radius:24px;
  overflow:hidden;
  background:#0D1F35;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 36px 70px rgba(0,0,0,0.65), 0 0 80px rgba(255,87,51,0.07);
}

.video-wrap {
  position:relative;
  padding-top:56.25%;
  background:#000;
  overflow:hidden;
}
#ytPlayer {
  position:absolute;
  inset:0;
  width:100%; height:100%;
  border:none;
}

/* ─── PLAY BLUR OVERLAY (2 SECOND) ─── */
#playBlurOverlay {
  position: absolute;
  inset: 0;
  background: rgba(8, 25, 46, 0.85);
  backdrop-filter: blur(12px);
  z-index: 25;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.1s ease;
}
#playBlurOverlay.active {
  opacity: 1;
  pointer-events: none;
  animation: blurFadeOut 2s ease-in-out forwards;
}
@keyframes blurFadeOut {
  0% {
    opacity: 1;
    backdrop-filter: blur(12px);
    background: rgba(8, 25, 46, 0.85);
  }
  50% {
    opacity: 1;
    backdrop-filter: blur(12px);
    background: rgba(8, 25, 46, 0.85);
  }
  100% {
    opacity: 0;
    backdrop-filter: blur(0px);
    background: transparent;
    visibility: hidden;
    display: none;
  }
}

.blur-spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255,87,51,0.2);
  border-top: 4px solid var(--fire);
  border-radius: 50%;
  animation: blurSpin 0.8s linear infinite;
}
@keyframes blurSpin {
  to { transform: rotate(360deg); }
}
.blur-text {
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  margin-top: 15px;
}

/* Loading Veil */
#loadVeil {
  position:absolute; inset:0; z-index:20;
  background:rgba(8,25,46,0.92);
  backdrop-filter:blur(24px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px;
  transition:opacity .9s ease;
}
#loadVeil.gone { opacity:0; pointer-events:none; }
.spinner {
  width:46px; height:46px;
  border:3px solid rgba(255,87,51,0.18);
  border-top-color:var(--fire);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
.load-txt {
  font-family:'Syne',sans-serif;
  font-weight:700; font-size:12px;
  letter-spacing:3px; color:rgba(255,255,255,0.55);
  text-transform:uppercase;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Action Veil */
#actionVeil {
  position:absolute; inset:0; z-index:15;
  pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  opacity:0;
}
#actionVeil.show { animation:veilFade 1.9s cubic-bezier(.22,1,.36,1) forwards; }
@keyframes veilFade {
  0%   { opacity:0; }
  12%  { opacity:1; }
  65%  { opacity:1; }
  100% { opacity:0; }
}
#actionVeil::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(circle at center, rgba(5,14,26,0.82) 0%, transparent 68%);
  backdrop-filter:blur(14px);
}
.a-wrap {
  position:relative; z-index:2;
  display:flex; align-items:center; justify-content:center;
}
.ring {
  position:absolute;
  width:88px; height:88px;
  border-radius:50%;
  border:2px solid transparent;
  opacity:0;
}
.ring1 { border-color:var(--fire); }
.ring2 { border-color:var(--amber); }
.a-wrap.pop .ring1 { animation:ringOut 1.6s .04s ease-out forwards; }
.a-wrap.pop .ring2 { animation:ringOut 1.6s .18s ease-out forwards; opacity:.45; }
@keyframes ringOut {
  0%   { transform:scale(.4); opacity:1; }
  100% { transform:scale(2.8); opacity:0; }
}
.sparks { position:absolute; width:0; height:0; }
.sp {
  position:absolute;
  width:7px; height:7px;
  border-radius:50%;
  opacity:0;
}
.a-wrap.pop .sp { animation: spFly .95s ease-out forwards; }
.sp:nth-child(1)  { background:var(--fire);  animation-delay:.04s; --a:0deg;   --d:72px; }
.sp:nth-child(2)  { background:var(--amber); animation-delay:.07s; --a:45deg;  --d:62px; }
.sp:nth-child(3)  { background:#FF8C42;      animation-delay:.02s; --a:90deg;  --d:78px; }
.sp:nth-child(4)  { background:var(--fire);  animation-delay:.09s; --a:135deg; --d:66px; }
.sp:nth-child(5)  { background:var(--amber); animation-delay:.05s; --a:180deg; --d:72px; }
.sp:nth-child(6)  { background:#FF6B35;      animation-delay:.08s; --a:225deg; --d:60px; }
.sp:nth-child(7)  { background:var(--fire);  animation-delay:.03s; --a:270deg; --d:76px; }
.sp:nth-child(8)  { background:var(--amber); animation-delay:.06s; --a:315deg; --d:64px; }
@keyframes spFly {
  0%   { transform:rotate(var(--a)) translateX(0)         scale(1); opacity:1; }
  100% { transform:rotate(var(--a)) translateX(var(--d))  scale(0); opacity:0; }
}
.a-icon {
  width:78px; height:78px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--fire),var(--amber));
  display:flex; align-items:center; justify-content:center;
  font-size:28px;
  box-shadow:0 0 50px rgba(255,87,51,0.7), 0 0 20px rgba(255,87,51,0.4);
  transform:scale(0);
}
.a-wrap.pop .a-icon { animation:iconPop 1.9s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes iconPop {
  0%   { transform:scale(0)   rotate(-20deg); opacity:0; }
  35%  { transform:scale(1.2) rotate(5deg);   opacity:1; }
  55%  { transform:scale(0.93)rotate(-2deg);  opacity:1; }
  75%  { transform:scale(1.0) rotate(0deg);   opacity:1; }
  100% { transform:scale(0.8) rotate(0deg);   opacity:0; }
}
#shield { position:absolute; inset:0; z-index:10; }

.prog-track { height:3px; background:rgba(255,255,255,0.07); }
#prog {
  height:100%;
  background:linear-gradient(90deg,var(--fire),var(--amber));
  width:0%;
  transition:width .8s linear;
  box-shadow:0 0 8px rgba(255,87,51,0.8);
}

.controls {
  background:linear-gradient(180deg,#0F2540 0%,#091829 100%);
  padding:14px 20px 20px;
  display:flex; flex-direction:column; gap:13px;
}
.time-row {
  display:flex; align-items:center; justify-content:space-between;
  font-size:11px; color:rgba(255,255,255,0.32); font-weight:500;
}
.status-pill { display:flex; align-items:center; gap:5px; }
.dot { width:6px; height:6px; border-radius:50%; background:#333; flex-shrink:0; }
.dot.live { background:#22C55E; animation:blink 1.6s ease-in-out infinite; }
@keyframes blink { 50% { opacity:.2; } }
.btn-row {
  display:flex; align-items:center; justify-content:center;
  gap:8px; flex-wrap:wrap;
}
.btn {
  border:none; cursor:pointer; border-radius:100px;
  font-family:'DM Sans',sans-serif; font-weight:700;
  font-size:12.5px;
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 18px;
  transition:transform .15s, box-shadow .15s;
}
.btn:active { transform:scale(0.93); }
.btn-play {
  background:linear-gradient(135deg,var(--fire),#FF8243);
  color:#fff;
  box-shadow:0 4px 20px rgba(255,87,51,0.45);
  padding:10px 22px;
}
.btn-play:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(255,87,51,0.6); }
.btn-pause {
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.75);
  border:1px solid rgba(255,255,255,0.1);
}
.btn-pause:hover { transform:translateY(-2px); background:rgba(255,255,255,0.11); }
.btn-sound {
  min-width:128px;
  justify-content:center;
  background:linear-gradient(135deg,#1A3A5C,#0F2540);
  color:rgba(255,165,0,0.9);
  border:1px solid rgba(255,165,0,0.28);
  box-shadow:0 3px 14px rgba(0,0,0,0.35);
}
.btn-sound.unmuted {
  background:linear-gradient(135deg,#133822,#0B2416);
  color:#4ADE80;
  border-color:rgba(74,222,128,0.32);
}
.btn-seek {
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.07);
}
.btn-seek:hover { transform:translateY(-2px); background:rgba(255,255,255,0.09); color:#fff; }
.sep { width:1px; height:26px; background:rgba(255,255,255,0.08); flex-shrink:0; }
.ic  { width:15px; height:15px; flex-shrink:0; display:block; }
#soundBtn .ic-vol-off { display:block; }
#soundBtn .ic-vol-on  { display:none; }
#soundBtn.unmuted .ic-vol-off { display:none; }
#soundBtn.unmuted .ic-vol-on  { display:block; }

@media (max-width:520px) {
  .btn { padding:8px 13px; font-size:11.5px; }
  .btn-play { padding:8px 18px; }
  .btn-sound { min-width:108px; }
  .sep { display:none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Biluxe<em>10</em> — Canva Masterclass</h1>
  <p>Private Course Player · HD</p>
</div>

<div class="card">
  <div class="video-wrap">
    <div id="ytPlayer"></div>
    <div id="playBlurOverlay" class="play-blur-overlay">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="blur-spinner"></div>
        <div class="blur-text">Starting Course...</div>
      </div>
    </div>
    <div id="loadVeil">
      <div class="spinner"></div>
      <div class="load-txt">Loading Course…</div>
    </div>
    <div id="actionVeil">
      <div class="a-wrap" id="aWrap">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="sparks"><div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div></div>
        <div class="a-icon" id="aIcon">▶</div>
      </div>
    </div>
    <div id="shield"></div>
  </div>
  <div class="prog-track"><div id="prog"></div></div>
  <div class="controls">
    <div class="time-row">
      <div class="status-pill"><div class="dot" id="dot"></div><span id="stateLabel">Connecting…</span></div>
      <span id="timeLabel">0:00 / 0:00</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-play" id="playBtn"><svg class="ic" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>Play</button>
      <button class="btn btn-pause" id="pauseBtn"><svg class="ic" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>Pause</button>
      <div class="sep"></div>
      <button class="btn btn-sound" id="soundBtn">
        <svg class="ic ic-vol-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        <svg class="ic ic-vol-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        <span id="soundLabel">Tap to Unmute</span>
      </button>
      <div class="sep"></div>
      <button class="btn btn-seek" id="backBtn"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>−10s</button>
      <button class="btn btn-seek" id="fwdBtn">+10s<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/></svg></button>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const VIDEO_ID = 'wCEtWz5imUs';
let player = null;
let ready = false;
let muted = true;
let isUserSeeking = false;
let flashTimer = null;

const loadVeil = document.getElementById('loadVeil');
const actionVeil = document.getElementById('actionVeil');
const aWrap = document.getElementById('aWrap');
const aIcon = document.getElementById('aIcon');
const progEl = document.getElementById('prog');
const dot = document.getElementById('dot');
const stateLabel = document.getElementById('stateLabel');
const timeLabel = document.getElementById('timeLabel');
const soundBtn = document.getElementById('soundBtn');
const soundLabel = document.getElementById('soundLabel');
const playBlurOverlay = document.getElementById('playBlurOverlay');
let blurTimer = null;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytPlayer', {
    videoId: VIDEO_ID,
    playerVars: {
      autoplay: 1,
      mute: 1,
      controls: 0,
      rel: 0,
      modestbranding: 1,
      showinfo: 0,
      iv_load_policy: 3,
      disablekb: 1,
      playsinline: 1,
      fs: 0,
    },
    events: {
      onReady: onReady,
      onStateChange: onStateChange,
    }
  });
}

function onReady(e) {
  ready = true;
  muted = true;
  syncSoundBtn();
  e.target.playVideo();
  setTimeout(() => loadVeil.classList.add('gone'), 3200);
  setInterval(tickProg, 500);
}

function onStateChange(e) {
  const map = {
    [-1]: ['Connecting…', false],
    [0]: ['Finished ✓', false],
    [1]: ['▶ Playing', true],
    [2]: ['⏸ Paused', false],
    [3]: ['Buffering…', false],
    [5]: ['Ready', false],
  };
  const [label, live] = map[e.data] ?? ['—', false];
  stateLabel.textContent = label;
  dot.classList.toggle('live', live);
}

function fmt(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function tickProg() {
  if (!ready || isUserSeeking) return;
  try {
    const c = player.getCurrentTime();
    const d = player.getDuration();
    if (d > 0) {
      progEl.style.width = (c / d * 100).toFixed(2) + '%';
      timeLabel.textContent = fmt(c) + ' / ' + fmt(d);
    }
  } catch(e) {}
}

function flash(icon) {
  actionVeil.classList.remove('show');
  aWrap.classList.remove('pop');
  aIcon.textContent = icon;
  void actionVeil.offsetWidth;
  actionVeil.classList.add('show');
  aWrap.classList.add('pop');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => {
    actionVeil.classList.remove('show');
    aWrap.classList.remove('pop');
  }, 1900);
}

function syncSoundBtn() {
  if (muted) {
    soundBtn.classList.remove('unmuted');
    soundLabel.textContent = 'Tap to Unmute';
  } else {
    soundBtn.classList.add('unmuted');
    soundLabel.textContent = 'Mute';
  }
}

function toggleSound() {
  if (!ready) return;
  if (muted) {
    player.unMute();
    player.setVolume(100);
    muted = false;
    flash('🔊');
    setTimeout(() => {
      if (player && player.getPlayerState && player.getPlayerState() !== 1) {
        player.playVideo();
      }
    }, 50);
  } else {
    player.mute();
    muted = true;
    flash('🔇');
  }
  syncSoundBtn();
}

// ✅ PLAY BUTTON WITH 2 SECOND BLUR OVERLAY
function doPlayWithBlur() {
  if (!ready) return;
  
  // Show blur overlay
  playBlurOverlay.classList.add('active');
  
  // Clear any previous timer
  if (blurTimer) clearTimeout(blurTimer);
  
  // After 2 seconds, start the video
  blurTimer = setTimeout(() => {
    if (player && player.playVideo) {
      player.playVideo();
    }
    playBlurOverlay.classList.remove('active');
    flash('▶');
  }, 2000);
}

function doPlay() { 
  if (!ready) return; 
  player.playVideo(); 
  flash('▶'); 
}

function doPause() { 
  if (!ready) return; 
  player.pauseVideo(); 
  flash('⏸'); 
}

function doBack() { 
  if (!ready) return; 
  isUserSeeking = true;
  player.seekTo(Math.max(0, player.getCurrentTime() - 10), true);
  setTimeout(() => { isUserSeeking = false; }, 500);
  flash('⏪');
}

function doFwd() { 
  if (!ready) return; 
  isUserSeeking = true;
  player.seekTo(player.getCurrentTime() + 10, true);
  setTimeout(() => { isUserSeeking = false; }, 500);
  flash('⏩');
}

// Event Listeners
document.getElementById('playBtn').addEventListener('click', doPlayWithBlur);
document.getElementById('pauseBtn').addEventListener('click', doPause);
document.getElementById('soundBtn').addEventListener('click', toggleSound);
document.getElementById('backBtn').addEventListener('click', doBack);
document.getElementById('fwdBtn').addEventListener('click', doFwd);

// Security
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const blocked = e.key === 'F12' || e.key === 'F5' || (e.ctrlKey && 'ruswRUSW'.includes(e.key)) || (e.ctrlKey && e.shiftKey && 'iIjJcC'.includes(e.key));
  if (blocked) { e.preventDefault(); return false; }
});
</script>
</body>
</html>
