<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LeadMint · Sign Up & Earn ₹5/Lead + ₹250/Referral</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDKs -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fb 0%, #e9edf2 100%);
      color: #0f172a;
      min-height: 100vh;
      padding: 20px 16px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .logo {
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #0a2f44, #1b6b5e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .tagline {
      text-align: center;
      color: #475569;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 28px 22px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #334155;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #1b6b5e;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      background: linear-gradient(135deg, #0a2f44, #1b6b5e);
      color: white;
      font-weight: 700;
      font-size: 16px;
      border: none;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .switch-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #475569;
    }

    .switch-link a {
      color: #1b6b5e;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .error-msg {
      color: #dc2626;
      font-size: 12px;
      margin-top: 6px;
    }

    .success-msg {
      color: #16a34a;
      font-size: 12px;
      margin-top: 6px;
    }

    .referral-hint {
      background: #fef3c7;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 12px;
      color: #92400e;
      margin-top: 8px;
    }

    hr {
      margin: 20px 0;
      border-color: #e2e8f0;
    }

    .benefits {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 20px;
    }

    .benefit {
      flex: 1;
      text-align: center;
      background: #f8fafc;
      padding: 12px;
      border-radius: 20px;
    }

    .benefit span {
      font-size: 20px;
    }

    .benefit p {
      font-size: 11px;
      color: #475569;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">🔥 LeadMint</div>
  <div class="tagline">Sell contacts • Earn ₹5/lead • ₹250/referral</div>

  <!-- Signup Card -->
  <div class="card" id="signupCard">
    <h2 style="margin-bottom: 20px;">Create Account</h2>
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Enter your full name">
    </div>
    <div class="input-group">
      <label>Email ID</label>
      <input type="email" id="signupEmail" placeholder="you@example.com">
    </div>
    <div class="input-group">
      <label>Password (min 6 characters)</label>
      <input type="password" id="signupPassword" placeholder="••••••">
    </div>
    <div class="input-group">
      <label>Phone Number (WhatsApp)</label>
      <input type="tel" id="signupPhone" placeholder="+91 XXXXXXXXXX">
    </div>
    <div class="input-group">
      <label>Referral Code (Optional)</label>
      <input type="text" id="signupReferral" placeholder="Enter friend's code">
    </div>
    <div id="signupError" class="error-msg"></div>
    <button class="btn-primary" id="doSignupBtn">🚀 Sign Up & Start Earning</button>
    <div class="switch-link">Already have an account? <a id="switchToLoginBtn">Login</a></div>
    <div class="benefits">
      <div class="benefit"><span>📱</span><p>₹5 per contact</p></div>
      <div class="benefit"><span>👥</span><p>₹250 per referral</p></div>
      <div class="benefit"><span>💸</span><p>15 referrals = withdraw ₹100</p></div>
    </div>
  </div>

  <!-- Login Card (hidden initially) -->
  <div class="card" id="loginCard" style="display: none;">
    <h2 style="margin-bottom: 20px;">Welcome Back</h2>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••">
    </div>
    <div id="loginError" class="error-msg"></div>
    <button class="btn-primary" id="doLoginBtn">🔐 Login</button>
    <div class="switch-link">New user? <a id="switchToSignupBtn">Create Account</a></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyDpFohe_piG3MpnpNJDZcGvTqg5tIu3B-I",
    authDomain: "leadcash-2cb77.firebaseapp.com",
    projectId: "leadcash-2cb77",
    storageBucket: "leadcash-2cb77.firebasestorage.app",
    messagingSenderId: "611052139341",
    appId: "1:611052139341:web:1c5ea10a24591987827d04"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Generate unique referral code (8 chars)
  function generateReferralCode(email) {
    return email.split('@')[0].substring(0, 6).toUpperCase() + Math.floor(Math.random() * 1000);
  }

  // Show/hide screens
  function showSignup() {
    document.getElementById('signupCard').style.display = 'block';
    document.getElementById('loginCard').style.display = 'none';
  }
  function showLogin() {
    document.getElementById('signupCard').style.display = 'none';
    document.getElementById('loginCard').style.display = 'block';
  }

  // Signup Handler
  document.getElementById('doSignupBtn').addEventListener('click', async () => {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const phone = document.getElementById('signupPhone').value.trim();
    const referralCodeInput = document.getElementById('signupReferral').value.trim().toUpperCase();

    if (!name || !email || !password || !phone) {
      document.getElementById('signupError').innerText = 'All fields required';
      return;
    }
    if (password.length < 6) {
      document.getElementById('signupError').innerText = 'Password must be at least 6 characters';
      return;
    }

    try {
      // Create Firebase Auth user
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = userCred.user.uid;
      
      // Generate own referral code
      const myReferralCode = generateReferralCode(email);
      
      // Check if referral code exists and give bonus
      let referredBy = null;
      let referrerBonusGiven = false;
      
      if (referralCodeInput) {
        // Find user with this referral code
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("referralCode", "==", referralCodeInput));
        const querySnapshot = await getDocs(q);
        if (!querySnapshot.empty) {
          const referrerDoc = querySnapshot.docs[0];
          referredBy = referrerDoc.id;
          
          // Add ₹250 to referrer's referral wallet
          const referrerData = referrerDoc.data();
          const newReferralWallet = (referrerData.referralWallet || 0) + 250;
          const newReferralCount = (referrerData.referralCount || 0) + 1;
          await updateDoc(doc(db, "users", referrerDoc.id), {
            referralWallet: newReferralWallet,
            referralCount: newReferralCount,
            totalReferralEarnings: (referrerData.totalReferralEarnings || 0) + 250
          });
          referrerBonusGiven = true;
        }
      }
      
      // Create user document in Firestore
      const userData = {
        uid: uid,
        name: name,
        email: email,
        phone: phone,
        password: password, // Stored as requested
        referralCode: myReferralCode,
        referredBy: referredBy,
        balance: 0,
        totalVerified: 0,
        verifiedLeads: [],
        referralWallet: 0,
        referralCount: referredBy ? 1 : 0,
        totalReferralEarnings: referredBy ? 250 : 0,
        createdAt: new Date().toLocaleString()
      };
      
      await setDoc(doc(db, "users", uid), userData);
      
      // Also store in localStorage for dashboard
      localStorage.setItem(`leadmint_user_${uid}`, JSON.stringify({
        balance: 0,
        verifiedLeads: [],
        totalVerified: 0,
        referralWallet: 0,
        referralCount: referredBy ? 1 : 0
      }));
      
      // Redirect to dashboard
      window.location.href = "dashboard.html";
      
    } catch (err) {
      document.getElementById('signupError').innerText = err.message;
    }
  });

  // Login Handler
  document.getElementById('doLoginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      document.getElementById('loginError').innerText = 'Email and password required';
      return;
    }
    
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      document.getElementById('loginError').innerText = err.message;
    }
  });

  document.getElementById('switchToLoginBtn').addEventListener('click', showLogin);
  document.getElementById('switchToSignupBtn').addEventListener('click', showSignup);
  
  // If already logged in, redirect to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "dashboard.html";
    }
  });
</script>
</body>
</html>
